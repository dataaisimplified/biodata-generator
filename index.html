<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biodata Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* ===== GLOBAL ===== */
body {
  margin:0;
  font-family:Poppins;
  display:flex;
  flex-direction:column;
}

/* DESKTOP */
@media(min-width:768px){
  body { flex-direction:row; }
}

/* ===== FORM ===== */
.form {
  width:100%;
  max-width:340px;
  padding:15px;
  background:#fff;
  border-right:1px solid #ddd;
}

.field {
  display:flex;
  flex-direction:column;
  margin-bottom:12px;
}

.field input,
.field textarea,
.field select {
  padding:8px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:5px;
}

button {
  padding:10px;
  margin:5px 0;
  border:none;
  background:#2c3e50;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}

/* ===== PREVIEW ===== */
.preview {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:#1e88e5;
  padding:10px;
}

/* ===== BIODATA ===== */
.biodata {
  width:100%;
  max-width:800px;
  padding:20px;
  color:#fff;
  border:6px solid #ddd;
}

.inner {
  border:2px solid #ddd;
  padding:20px;
}

.header {
  text-align:center;
  font-family:'Playfair Display';
  margin-bottom:20px;
}

/* ===== DESKTOP LAYOUT ===== */
.content {
  display:flex;
  gap:20px;
  align-items:flex-start;
}

.details {
  flex:1;
}

.row {
  display:flex;
  margin:8px 0;
}

.label { width:140px; }
.colon { width:10px; }
.value { flex:1; }

.section-title {
  margin-top:15px;
  font-weight:bold;
  border-bottom:1px solid currentColor;
}

/* IMAGE */
.photo-box {
  width:180px;
  height:220px;
  border:3px solid #ddd;
  flex-shrink:0;
}

.photo-box img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== MOBILE GRID FIX ===== */
@media(max-width:768px){

  .content {
    display:grid;
    grid-template-columns: 1fr 120px;
    gap:10px;
    align-items:start;
  }

  .details {
    grid-column:1;
    grid-row:1;
  }

  .photo-box {
    grid-column:2;
    grid-row:1;
    width:120px;
    height:160px;
  }

  .label {
    width:110px;
    font-size:13px;
  }

  .value {
    font-size:13px;
  }

}

/* ===== TEMPLATE ===== */
.template-blue {
  background:linear-gradient(#2196f3,#1565c0);
}

</style>
</head>

<body>

<!-- FORM -->
<div class="form">

<h3>Biodata Builder</h3>

<div id="fields"></div>

<button onclick="addField()">+ Add Field</button>

<input type="file" id="photo">

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="downloadImage()">Download Image</button>

</div>

<!-- PREVIEW -->
<div class="preview">

<div id="biodata" class="biodata template-blue">

<div class="inner">

<div class="header">ॐ श्री गणेशाय नमः</div>

<div class="content">

<div class="details">
<div id="basic"></div>

<div class="section-title">Family Details</div>
<div id="family"></div>

<div class="section-title">Contact Details</div>
<div id="contact"></div>
</div>

<div class="photo-box">
<img id="previewPhoto">
</div>

</div>

</div>

</div>

</div>

<script>

/* DEFAULT FIELDS */
const defaults = [
["Name","basic"],
["Date of Birth","basic"],
["Time Of Birth","basic"],
["Height","basic"],
["Weight","basic"],
["Father Name","family"],
["Mother Name","family"],
["Phone","contact"],
["Address","contact"]
];

window.onload = init;

function init(){
  fields.innerHTML="";
  defaults.forEach(f=>createField(f[0],f[1]));
  update();
}

function createField(label,section){
  const div=document.createElement("div");
  div.className="field";

  div.innerHTML=`
    <input value="${label}">
    <textarea placeholder="Value"></textarea>
    <select>
      <option value="basic" ${section=="basic"?"selected":""}>Basic</option>
      <option value="family" ${section=="family"?"selected":""}>Family</option>
      <option value="contact" ${section=="contact"?"selected":""}>Contact</option>
    </select>
  `;

  fields.appendChild(div);
}

function addField(){
  createField("New Field","basic");
}

/* UPDATE */
document.addEventListener("input", update);

function update(){
  basic.innerHTML="";
  family.innerHTML="";
  contact.innerHTML="";

  document.querySelectorAll(".field").forEach(f=>{
    const label=f.children[0].value;
    const value=f.children[1].value.replace(/\n/g,"<br>");
    const section=f.children[2].value;

    if(label && value){
      const row=`
      <div class="row">
        <div class="label">${label}</div>
        <div class="colon">:</div>
        <div class="value">${value}</div>
      </div>`;

      if(section==="basic") basic.innerHTML+=row;
      if(section==="family") family.innerHTML+=row;
      if(section==="contact") contact.innerHTML+=row;
    }
  });
}

/* PHOTO */
photo.onchange = e=>{
  const reader=new FileReader();
  reader.onload=e=>{
    previewPhoto.src=e.target.result;
  };
  reader.readAsDataURL(e.target.files[0]);
};

/* PDF */
async function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(biodata,{scale:2});
  const img = canvas.toDataURL("image/png");

  const pdf = new jsPDF("p","mm","a4");
  pdf.addImage(img,"PNG",0,0,210,297);
  pdf.save("biodata.pdf");
}

/* IMAGE */
function downloadImage(){
  html2canvas(biodata,{scale:2}).then(canvas=>{
    const link=document.createElement("a");
    link.download="biodata.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

</script>

</body>
</html>
